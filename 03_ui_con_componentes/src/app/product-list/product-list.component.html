@if (products.length > 0) {
  <h1>Products ({{products.length}})</h1>
}

<ul class="pill-group">
  @for (product of products; track product.id) {
    <li class="pill" (click)="selectedProduct = product">
      @switch (product.title) {
        @case ('Keyboard') { ⌨️ }
        @case ('Microphone') { 🎙️ }
        @default { 🏷️ }
      }
      {{product.title}}
    </li>
  } @empty {
    <p>No products found!</p>
  }
</ul>

<!-- Agrega prodcutos al carrito cuando seleccionamos add-->
<app-product-detail
  [product]="selectedProduct"
  (added)="onAdded()"
></app-product-detail>

<!--Elimina el producto del carrito cuando selecionamos la X-->
<app-cart [items]="cart" (remove)="onRemove($event)"></app-cart>
