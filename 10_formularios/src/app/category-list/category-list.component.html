<h1>Categorias</h1>

<!--Componente hijo: search-bar-->
<app-search-bar (searchChange)= "onSearchChange($event)"></app-search-bar>

<ul>
    @for (category of categories; track category.id){
        <li>{{category.name}}</li>
    }

    @if (sinCoincidencia){
      <p>No se encontro ninguna categoria</p>
    }

</ul>

<app-category-create (categoryCreated)="addCategory($event)">

</app-category-create>
